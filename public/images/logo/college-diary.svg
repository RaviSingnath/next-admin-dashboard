<svg xmlns="http://www.w3.org/2000/svg" viewBox="5 5 190 190">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141e30"/>
      <stop offset="100%" stop-color="#243b55"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1abc9c"/>
      <stop offset="100%" stop-color="#16a085"/>
    </linearGradient>
    <linearGradient id="shieldInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f6e60"/>
      <stop offset="100%" stop-color="#0a4d44"/>
    </linearGradient>
    <linearGradient id="diaryG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdfaf5"/>
      <stop offset="100%" stop-color="#f0e8d5"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="diaryClip">
      <rect x="81" y="72" width="47" height="68"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#bg3)"/>
  <!-- Decorative ring -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="#1abc9c" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#1abc9c" stroke-width="0.5" opacity="0.2"/>

  <!-- Shield shape -->
  <path d="M100 30 L155 55 L155 105 Q155 148 100 172 Q45 148 45 105 L45 55 Z" fill="url(#shieldGrad)" filter="url(#shadow3)"/>
  <!-- Shield inner border -->
  <path d="M100 38 L148 60 L148 105 Q148 142 100 164 Q52 142 52 105 L52 60 Z" fill="url(#shieldInner)"/>

  <!-- Diary on shield -->
  <rect x="72" y="72" width="56" height="68" rx="5" fill="url(#diaryG)" filter="url(#shadow3)"/>
  <!-- Diary spine -->
  <rect x="72" y="72" width="9" height="68" rx="3" fill="#e74c3c"/>
  <!-- Diary rings -->
  <circle cx="81" cy="88" r="4" fill="none" stroke="#c0392b" stroke-width="2"/>
  <circle cx="81" cy="104" r="4" fill="none" stroke="#c0392b" stroke-width="2"/>
  <circle cx="81" cy="120" r="4" fill="none" stroke="#c0392b" stroke-width="2"/>

  <!-- ── USER PROFILE CARD INSIDE DIARY ── -->
  <g clip-path="url(#diaryClip)">

    <!-- Avatar circle -->
    <circle cx="96" cy="87" r="9" fill="#1abc9c"/>
    <!-- Head shape inside avatar -->
    <circle cx="96" cy="84" r="4" fill="#0e8f76"/>
    <!-- Shoulders arc -->
    <path d="M87 96 Q87 91 96 91 Q105 91 105 96 Z" fill="#0e8f76"/>

    <!-- Name line (wide, dark) -->
    <rect x="88" y="100" width="34" height="3.5" rx="1.8" fill="#b0c4c0" opacity="0.9"/>

    <!-- Sub-info lines (shorter, lighter) -->
    <rect x="91" y="107" width="26" height="2.5" rx="1.2" fill="#c9b99a" opacity="0.8"/>
    <rect x="93" y="113" width="20" height="2.5" rx="1.2" fill="#c9b99a" opacity="0.7"/>

    <!-- Divider line -->
    <line x1="85" y1="120" x2="123" y2="120" stroke="#c9b99a" stroke-width="0.8" opacity="0.6"/>

    <!-- Two tag/badge skeleton blocks -->
    <rect x="86" y="124" width="16" height="5" rx="2.5" fill="#1abc9c" opacity="0.35"/>
    <rect x="106" y="124" width="16" height="5" rx="2.5" fill="#1abc9c" opacity="0.25"/>

  </g>

  <!-- Laurel leaves on sides of shield -->
  <ellipse cx="56" cy="95" rx="8" ry="4" fill="#27ae60" opacity="0.7" transform="rotate(-30,56,95)"/>
  <ellipse cx="52" cy="108" rx="8" ry="4" fill="#27ae60" opacity="0.7" transform="rotate(-20,52,108)"/>
  <ellipse cx="51" cy="122" rx="8" ry="4" fill="#27ae60" opacity="0.6" transform="rotate(-10,51,122)"/>
  <ellipse cx="144" cy="95" rx="8" ry="4" fill="#27ae60" opacity="0.7" transform="rotate(30,144,95)"/>
  <ellipse cx="148" cy="108" rx="8" ry="4" fill="#27ae60" opacity="0.7" transform="rotate(20,148,108)"/>
  <ellipse cx="149" cy="122" rx="8" ry="4" fill="#27ae60" opacity="0.6" transform="rotate(10,149,122)"/>

  <!-- Bottom banner -->
  <path d="M65 162 Q100 175 135 162 L132 172 Q100 183 68 172 Z" fill="#f0c040"/>
  <!-- Banner text line -->
  <line x1="75" y1="168" x2="125" y2="168" stroke="#b8960c" stroke-width="1"/>

  <!-- Sparkles -->
  <circle cx="40" cy="48" r="2" fill="white" opacity="0.4" filter="url(#glow3)"/>
  <circle cx="160" cy="42" r="1.8" fill="white" opacity="0.35" filter="url(#glow3)"/>
</svg>